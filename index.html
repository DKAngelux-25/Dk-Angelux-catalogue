<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dk Angelux - Catalogue</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
<header class="main-header">
    <div id="cart-status" class="cart-info">
        <i class="fas fa-shopping-basket"></i>
        <span id="cart-count">0</span> articles | <span id="cart-total">0</span> FCFA
    </div>

    <div class="logo-container">
        <img src="images/logo-dk-angelux.png" alt="Dk Angelux" class="logo">
    </div>

    <div class="search-container">
        <div class="search-bar">
            <input type="text" placeholder="Rechercher...">
            <button><i class="fas fa-search"></i></button>
        </div>
    </div>
</header>

<nav class="categories-nav">
    <div class="category-item" onclick="filterCategory('alimentaire')">
        <div class="circle"><i class="fas fa-apple-alt"></i></div>
        <span>Alimentation</span>
    </div>
    <div class="category-item" onclick="filterCategory('bricolage')">
        <div class="circle"><i class="fas fa-tools"></i></div>
        <span>Bricolage</span>
    </div>
    <div class="category-item" onclick="filterCategory('Liqu..& Bonss..')">
        <div class="circle"><i class="fas fa-wine-bottle"></i></div>
        <span>Boissons</span>
    </div>
    <div class="category-item" onclick="filterCategory('Epice & Leg.. Fru...')">
        <div class="circle"><i class="fas fa-pepper-hot"></i></div>
        <span>Épices</span>
    </div>
    <div class="category-item" onclick="filterCategory('BEBE')">
        <div class="circle"><i class="fas fa-baby-carriage"></i></div>
        <span>Bébé</span>
    </div>
    <div class="category-item" onclick="filterCategory('FRAIS SURG..')">
        <div class="circle"><i class="fas fa-snowflake"></i></div>
        <span>Frais</span>
    </div>
</nav>
<section class="carousel-container">
        <div class="carousel-slide fade">
            <img src="images/pub2.png" alt="Promotion Pâques">
            <div class="carousel-caption">Jusqu'à -34% sur la gamme Favorina</div>
        </div>
        <div class="carousel-slide fade">
            <img src="images/pub3.png" alt="Nouveautés">
            <div class="carousel-caption">Découvrez nos nouveaux arrivages !</div>
        </div>
        <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
        <a class="next" onclick="plusSlides(1)">&#10095;</a>
    </section>

   <div class="cart-controls">
    <button onclick="clearCart()" class="clear-btn">
        <i class="fas fa-trash"></i> Vider le panier
    </button>
    <a href="javascript:void(0)" onclick="sendWhatsApp()" class="whatsapp-btn">
        <i class="fab fa-whatsapp"></i> Commander
    </a>
</div>
    <div id="category-header"></div>

<section id="product-grid" class="product-grid">
    </section>

<div class="cart-controls">
    <button onclick="clearCart()" class="clear-btn">
        <i class="fas fa-trash"></i> Vider le panier
    </button>
    <a href="javascript:void(0)" onclick="sendWhatsApp()" class="whatsapp-btn">
        <i class="fab fa-whatsapp"></i> Commander
    </a>
</div>

    <footer>
        <p>Quartier LOGOTÉ – SAGBADO, LOMÉ-TOGO</p>
        <p>Contact : +228 70 00 93 06</p>
        <strong>Dk Angelux – Le choix vous distingue</strong>
    </footer>

    <script src="products.js"></script>
    <script src="script.js"></script>
</body>
</html>
